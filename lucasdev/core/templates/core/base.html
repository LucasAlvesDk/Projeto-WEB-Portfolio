{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LucasDev - {% block title %}{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="stylesheet" href="{% static 'styles/main.css' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">

    <style>
        .sino-btn {
            background: none;
            border: none;
            color: #374151;
            font-size: 1.3em;
            cursor: pointer;
            position: relative;
            padding: 0;
            line-height: 1;
        }
        .sino-btn:hover {
            color: #2563eb;
        }
        .sino-badge {
            position: absolute;
            top: -7px;
            right: -10px;
            background-color: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .sino-badge.sem-conexao  { background-color: #95a5a6; }
        .sino-badge.sem-mensagens { background-color: #27ae60; }

        .sino-wrapper {
            position: relative;
        }
        .notif-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 36px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1050;
        }
        .notif-dropdown.aberto { display: block; }
        .notif-dropdown-header {
            padding: 12px 15px;
            background: #2c3e50;
            color: white;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            font-size: 0.9em;
        }
        .notif-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item.nao-lida {
            border-left: 3px solid #3498db;
            background: #eef6ff;
        }
        .notif-item .notif-mensagem {
            font-size: 0.88em;
            color: #333;
        }
        .notif-item .notif-data {
            font-size: 0.75em;
            color: #999;
            margin-top: 4px;
        }
        .notif-vazio {
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    {% include '_partials/_navbar.html' %}

    {% include '_partials/_login_modal.html' %}
    {% include '_partials/_edit_modal.html' %}

    {% block content %}
    {% endblock content %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'scripts/edit_perfil.js' %}"></script>

    <script>
    (function() {
        var MS_URL  = '{{ NOTIFICACAO_MS_URL }}';
        var API_KEY = '{{ NOTIFICACAO_MS_API_KEY }}';
        var USER_ID = localStorage.getItem('user_id') || '';

        var sinoBtn    = document.getElementById('sino-btn');
        var sinoBadge  = document.getElementById('sino-badge');
        var dropdown   = document.getElementById('notif-dropdown');
        var notifLista = document.getElementById('notif-lista');

        var headers = {
            'X-Api-Key': API_KEY,
            'X-User-Id': USER_ID,
        };

        function buscarContagem() {
            fetch(MS_URL + '/api/notificacoes/nao-lidas/', { headers: headers })
                .then(function(r) {
                    if (!r.ok) throw new Error();
                    return r.json();
                })
                .then(function(data) {
                    sinoBadge.classList.remove('sem-conexao', 'sem-mensagens');
                    if (data.count === 0) {
                        sinoBadge.textContent = '0';
                        sinoBadge.classList.add('sem-mensagens');
                    } else {
                        sinoBadge.textContent = data.count;
                    }
                })
                .catch(function() {
                    sinoBadge.textContent = 'X';
                    sinoBadge.classList.remove('sem-mensagens');
                    sinoBadge.classList.add('sem-conexao');
                });
        }

        function buscarNotificacoes() {
            notifLista.innerHTML = '<div class="notif-vazio">Carregando...</div>';
            fetch(MS_URL + '/api/notificacoes/', { headers: headers })
                .then(function(r) {
                    if (!r.ok) throw new Error();
                    return r.json();
                })
                .then(function(notificacoes) {
                    if (notificacoes.length === 0) {
                        notifLista.innerHTML = '<div class="notif-vazio">Nenhuma notificacao.</div>';
                        return;
                    }
                    var html = '';
                    notificacoes.forEach(function(notif) {
                        var classe = notif.is_read ? 'notif-item' : 'notif-item nao-lida';
                        var data   = new Date(notif.criado_em).toLocaleString('pt-BR');
                        html += '<div class="' + classe + '" data-id="' + notif.id + '">';
                        html += '<div class="notif-mensagem">' + notif.mensagem + '</div>';
                        html += '<div class="notif-data">' + data + '</div>';
                        html += '</div>';
                    });
                    notifLista.innerHTML = html;
                    notifLista.querySelectorAll('.notif-item.nao-lida').forEach(function(item) {
                        item.addEventListener('click', function() {
                            marcarComoLida(this.getAttribute('data-id'), this);
                        });
                    });
                })
                .catch(function() {
                    notifLista.innerHTML = '<div class="notif-vazio">Erro ao carregar notificacoes.</div>';
                });
        }

        function marcarComoLida(id, elemento) {
            fetch(MS_URL + '/api/notificacoes/' + id + '/lida/', {
                method: 'PATCH',
                headers: headers,
            })
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function() {
                elemento.classList.remove('nao-lida');
                buscarContagem();
            })
            .catch(function(e) { console.error('Erro ao marcar como lida:', e); });
        }

        sinoBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (dropdown.classList.contains('aberto')) {
                dropdown.classList.remove('aberto');
            } else {
                dropdown.classList.add('aberto');
                buscarNotificacoes();
            }
        });

        document.addEventListener('click', function() {
            dropdown.classList.remove('aberto');
        });

        dropdown.addEventListener('click', function(e) { e.stopPropagation(); });

        buscarContagem();
        setInterval(buscarContagem, 5000);
    })();
    </script>

</body>
</html>
